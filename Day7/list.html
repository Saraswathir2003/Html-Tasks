<!doctype html>
<html>
  <head>
    <title>Nested Lists Example</title>
    <style>
      h1 {
        background-color: aquamarine;
        text-align: center;
      }
      h2 {
        background-color: hwb(198 58% 7%);
      }
    </style>
  </head>
  <body>
    <h1>SHOPPING WORLD</h1>

    <h2>Grocery List</h2>
    <ul>
      <li>
        Fruits
        <ul>
          <li>Apple</li>
          <li>Banana</li>
          <li>Orange</li>
        </ul>
      </li>
      <li>
        Vegetables
        <ul>
          <li>Carrot</li>
          <li>Potato</li>
          <li>Tomato</li>
        </ul>
      </li>
      <li>Snacks</li>
    </ul>

    <h2>DRESS</h2>
    <ol>
      <li>Dresses</li>
      <li>
        Womens
        <ol>
          <li>Kurthas</li>
          <li>T-Shirts</li>
        </ol>
      </li>
      <li>Shirts</li>
      <li>Jeans</li>
    </ol>
  </body>
</html>
