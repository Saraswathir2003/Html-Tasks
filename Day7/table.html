<!DOCTYPE html>
<html>
<head>
    <title>Shopping Cart</title>

    <style>
        body {
            font-family: Arial;
        }

        table {
            width: 70%;
            margin: auto;
            border-collapse: collapse; 
        }

        th, td {
            border: 2px solid black;
            padding: 10px;       
            text-align: center;
        }

        th {
            background-color: lightgray;
        }

        .total {
            font-weight: bold;
            background-color: hwb(60 55% 23%);
        }
    </style>

</head>
<body>

    <h2 style="text-align:center;">🛒 Shopping Cart</h2>

    <table>
        <tr>
            <th rowspan="2">Item</th>
            <th colspan="2">Details</th>
            <th rowspan="2">Price</th>
        </tr>

        <tr>
            <th>Quantity</th>
            <th>Category</th>
        </tr>

        <tr>
            <td>Apple</td>
            <td>2</td>
            <td>Fruit</td>
            <td>₹100</td>
        </tr>

        <tr>
            <td>Milk</td>
            <td>1</td>
            <td>Dairy</td>
            <td>₹50</td>
        </tr>

        <tr>
            <td>Bread</td>
            <td>3</td>
            <td>Bakery</td>
            <td>₹90</td>
        </tr>

        <tr class="total">
            <td colspan="3">Total</td>
            <td>₹240</td>
        </tr>
    </table>

</body>
</html>
