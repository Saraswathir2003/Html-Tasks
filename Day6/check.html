<!doctype html>
<html>
  <head>
    <title>Input Types Practice</title>
  </head>
  <style>
    h1 {
      background-color: aquamarine;
      text-align: center;
    }
  </style>
  <body>
    <h1>Welcome All</h1>

    <form>
      <!-- Checkboxes (Multiple Choice) -->
      <label>Choose your hobbies:</label><br />
      <input type="checkbox" name="hobby" /> Reading<br />
      <input type="checkbox" name="hobby" /> Sports<br />
      <input type="checkbox" name="hobby" /> Music<br /><br />

      <!-- Radio Buttons (Single Choice) -->
      <label>Select your gender:</label><br />
      <input type="radio" name="gender" /> Male<br />
      <input type="radio" name="gender" /> Female<br />

      <!-- Number Input -->
      <label>Enter your age:</label><br />
      <input type="number" min="1" max="100" /><br /><br />

      <!-- Submit Button -->
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
