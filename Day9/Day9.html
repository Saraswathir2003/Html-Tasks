<!doctype html>
<html lang="en">
  <head>
    <title>Box Model</title>
    <style>
      h1 {
        text-align: center;
        background-color: aquamarine;
        color: #333;
      }
      .box {
        width: 400px;
        height:200px;
        font-size: 20px;
        color: black;
        padding: 40px;
        border: 5px solid palevioletred;
        margin: 100px;
        background-color: hsl(352, 52%, 84%);
        font-style: oblique;
      }
    </style>
  </head>
  <body>
    <h1>Reading Books</h1>
    <div class="box">
      <b>Improves Knowledge</b>
      <br />
      <p>
        Books give you new information about different topics like science,
        history, and life skills. The more you read, the more you learn. Reading
        improves thinking skills and knowledge.
      </p>
    </div>
  </body>
</html>
