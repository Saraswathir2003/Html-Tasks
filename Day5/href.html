<!doctype html>
<html>
  <head>
    <title>Hyperlink Example</title>
    <style>
      h1 {
        background-color: #4793d5;
        text-align: center;
      }
      h2 {
        background-color: aquamarine;
      }
    </style>
  </head>
  <body>
    <h1>HYPER LINKS</h1>

    <!-- Absolute Links (External Websites) -->
    <h2>Absolute Links</h2>
    <p>
      Visit Google
      <a href="https://www.google.com" target="_blank">Google</a>
    </p>

    <p>
      Visit Youtube
      <a href="https://www.youtube.com" target="_blank">YouTube</a>
    </p>

    <!-- Relative Links (Local Files) -->
    <h2>Relative Links</h2>
    <p>
      Go to
      <a href="ID.html">About Page</a>
    </p>

    <p>
      Go to
      <a href="Class.html">Contact Page</a>
    </p>
  </body>
</html>
