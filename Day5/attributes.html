<!doctype html>
<html>
  <head>
    <title>Attributes</title>
  </head>
  <style>
    h1 {
      text-align: center;
    }
  </style>
  <body>
    <h1 title="This is a heading">Welcome to My Page</h1>

    <!-- Link with href and target -->
    <p>
      Visit
      <a href="https://www.youtube.com" target="_blank"> Youtube </a>
    </p>
    <!-- Image with src, alt, width, height -->
    <img src="Nature.png" alt="Nature Image" width="150" height="150" />
    <p style="color: blue">
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Culpa obcaecati
      et placeat. Esse animi inventore quibusdam dolore quidem, minus quam?.
    </p>
  </body>
</html>
